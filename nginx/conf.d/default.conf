server {
    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    listen 80;
    server_name desinomads.com www.desinomads.com;

    # Certbot ACME challenge (used for auto-renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # ── HTTPS – API reverse proxy ─────────────────────────────────────────────
    listen 443 ssl;
    http2  on;
    server_name desinomads.com www.desinomads.com;

    # ── SSL certificates (Let's Encrypt) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/desinomads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/desinomads.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── CORS — allow Vercel frontends ─────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "(https://.*\.vercel\.app|https://edgestonefrontend\.vercel\.app)$") {
        set $cors_origin $http_origin;
    }

    # ── Proxy all /api/* → backend container ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts — generous for slow DB queries
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # CORS response headers
        add_header Access-Control-Allow-Origin      $cors_origin   always;
        add_header Access-Control-Allow-Credentials true           always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept" always;

        # Handle OPTIONS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health check (public) ─────────────────────────────────────────────────
    location = / {
        proxy_pass         http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }
}
